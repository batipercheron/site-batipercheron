<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue Matériaux - Bati Percheron</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-nav">
        <a href="index.html" class="nav-brand">
            <img src="assets/logo-horizontal.jpeg" alt="Bati Percheron" class="nav-logo-img">
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Accueil</a></li>
                <li><a href="recrutement.html">Postuler</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li>
                    <a href="https://www.instagram.com/batipercheron" target="_blank" rel="noopener noreferrer" class="nav-insta">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                        </svg>
                        Nos Réalisations
                    </a>
                </li>
                <li class="nav-pnr">
                    <img src="assets/logo-parc-perche.jpg" alt="Parc Naturel Régional du Perche" class="pnr-logo-img">
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-intro-section">
            <div class="container">
                <a href="materiaux-anciens.html" class="btn-text" style="display: inline-block; margin-bottom: 1rem;">← Retour aux matériaux</a>
                <h1 class="section-title">Catalogue des Matériaux</h1>
                <div id="catalog-container">
                    <p style="text-align: center; padding: 3rem;">Chargement du catalogue...</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Bati Percheron. Tous droits réservés.</p>
        <p class="legal-mentions">EURL BATI PERCHERON - 4 chemin de Soizé, La Livraise, 61340 BERD'HUIS - SIRET : 812 199 719 0002</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('catalog-container');
            const urlParams = new URLSearchParams(window.location.search);
            const category = urlParams.get('cat');
            
            fetch('data/materiaux.json')
                .then(response => response.json())
                .then(data => {
                    const titleEl = document.querySelector('.section-title');
                    let catTitle = category ? category.replace(/-/g, ' ') : 'Tous nos matériaux';
                    let catDesc = '';
                    
                    if (category && data.categories) {
                        const foundCat = data.categories.find(c => c.slug === category);
                        if (foundCat) {
                            catTitle = foundCat.titre || catTitle;
                            catDesc = foundCat.description || '';
                        }
                    }
                    
                    if (titleEl && category) {
                        titleEl.textContent = "Catalogue : " + catTitle;
                    }

                    // Ajout de la description introductive
                    let headerHtml = '';
                    if (catDesc) {
                        headerHtml = `<p class="lead-text" style="margin-bottom: 2.5rem; font-size: 1.05rem;">${catDesc}</p>`;
                    }

                    const articles = data.articles || [];
                    const filteredArticles = category ? articles.filter(a => a.categorie === category) : articles;

                    if (filteredArticles.length === 0) {
                        container.innerHTML = headerHtml + `
                            <div style="text-align: center; padding: 3rem 2rem; background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); max-width: 700px; margin: 2rem auto; border: 1px solid #eae5dc;">
                                <h3 style="color: var(--color-primary); margin-bottom: 1rem; font-family: 'Playfair Display', serif; font-size: 1.4rem;">Aucun lot disponible en ligne pour le moment</h3>
                                <p style="color: var(--color-text-light); margin-bottom: 2rem;">Notre stock de matériaux de réemploi évolue au fil de nos chantiers. N'hésitez pas à nous contacter directement pour connaître nos tout derniers arrivages en <strong>${catTitle.toLowerCase()}</strong>.</p>
                                <a href="contact.html?service=materiaux" class="btn-primary">Nous contacter</a>
                            </div>
                        `;
                    } else {
                        let cardsHtml = '';
                        filteredArticles.forEach(article => {
                            let imgPath = article.image;
                            let imgHtml = `<div class="material-image-placeholder" style="height: 240px; background: #f5f3ef; display: flex; align-items: center; justify-content: center; color: #aaa; font-style: italic;">Photo sur demande</div>`;
                            if (imgPath && imgPath.trim() !== '') {
                                // Ajustement du chemin si nécessaire
                                if (!imgPath.startsWith('http') && !imgPath.startsWith('images/') && !imgPath.startsWith('/')) {
                                    imgPath = 'images/' + imgPath;
                                }
                                imgHtml = `<img src="${imgPath}" alt="${article.titre}" style="width: 100%; height: 240px; object-fit: cover; display: block;">`;
                            }

                            cardsHtml += `
                                <div class="material-card" style="display: flex; flex-direction: column; height: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid #eae5dc; transition: var(--transition);">
                                    ${imgHtml}
                                    <div class="material-content" style="padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1;">
                                        <h3 style="font-family: 'Playfair Display', serif; color: var(--color-primary); font-size: 1.3rem; margin-bottom: 0.5rem; text-align: left;">${article.titre}</h3>
                                        <p style="color: var(--color-text-light); font-size: 0.95rem; line-height: 1.5; margin-bottom: 1rem; text-align: left; flex-grow: 1;">${article.description || ''}</p>
                                        ${article.quantite ? `<p style="font-size: 0.9rem; color: var(--color-accent); margin-bottom: 1rem; text-align: left;"><strong>Quantité indicative :</strong> ${article.quantite}</p>` : ''}
                                        <div class="material-price" style="font-size: 1.3rem; font-weight: 600; color: var(--color-primary); margin-bottom: 1.2rem; text-align: left;">${article.prix || 'Sur devis'}</div>
                                        <a href="contact.html?service=materiaux&ref=${encodeURIComponent(article.titre)}" class="btn-secondary material-buy-btn" style="text-align: center; width: 100%; padding: 0.8rem; font-size: 0.95rem;">Nous contacter pour ce lot</a>
                                    </div>
                                </div>
                            `;
                        });

                        container.innerHTML = headerHtml + `<div class="materials-grid" style="margin-top: 1rem;">${cardsHtml}</div>`;
                    }
                })
                .catch(err => {
                    console.error("Erreur lors du chargement des matériaux:", err);
                    container.innerHTML = `
                        <div style="text-align: center; padding: 3rem; color: var(--color-error);">
                            <p>Impossible de charger le catalogue des matériaux pour le moment.</p>
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>
