<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - Bati Percheron</title>
</head>
<body>
  <script>
    (function() {
      let currentSveltiaInput = null;
      const originalClick = HTMLInputElement.prototype.click;

      // Crée ou récupère le menu personnalisé en utilisant un élément <dialog> natif
      // Cela permet de garantir qu'il s'affichera par-dessus les autres modales de Sveltia (Top Layer)
      function ensureModal() {
          let dialog = document.getElementById('custom-photo-modal');
          if (!dialog) {
              dialog = document.createElement('dialog');
              dialog.id = 'custom-photo-modal';
              // Styling du dialog natif
              dialog.style.cssText = 'padding:0; border:none; border-radius:16px; background:transparent; max-width:350px; width:90%; overflow:visible; outline:none; margin:auto;';
              
              dialog.innerHTML = `
                <style>
                  #custom-photo-modal::backdrop {
                      background: rgba(0,0,0,0.6);
                      backdrop-filter: blur(3px);
                  }
                </style>
                <div style="background:white; padding:25px; border-radius:16px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                  <h3 style="margin-top:0; font-size:20px; color:#111;">Ajouter une photo</h3>
                  <p style="color:#666; font-size:15px; margin-bottom:25px;">Où se trouve votre image ?</p>
                  
                  <button id="btn-camera" style="width:100%; padding:16px; background:#2563eb; color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; margin-bottom:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;">
                    <span style="font-size:20px;">📷</span> Prendre une photo
                  </button>
                  
                  <button id="btn-files" style="width:100%; padding:16px; background:#10b981; color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; margin-bottom:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;">
                    <span style="font-size:20px;">📁</span> Fichiers locaux
                  </button>
                  
                  <button id="btn-cancel" style="width:100%; padding:12px; background:transparent; color:#6b7280; border:none; border-radius:10px; font-size:15px; font-weight:bold; cursor:pointer;">
                    Annuler
                  </button>
                </div>
              `;
              document.body.appendChild(dialog);
              
              document.getElementById('btn-camera').addEventListener('click', () => {
                  if (currentSveltiaInput) {
                      currentSveltiaInput.setAttribute('capture', 'environment');
                      currentSveltiaInput.setAttribute('accept', 'image/*');
                      dialog.close();
                      currentSveltiaInput.dataset.bypass = "true";
                      originalClick.apply(currentSveltiaInput);
                  }
              });

              document.getElementById('btn-files').addEventListener('click', () => {
                  if (currentSveltiaInput) {
                      currentSveltiaInput.removeAttribute('capture');
                      if (/Android/i.test(navigator.userAgent)) {
                          currentSveltiaInput.setAttribute('accept', '*/*');
                      } else {
                          currentSveltiaInput.setAttribute('accept', 'image/*');
                      }
                      dialog.close();
                      currentSveltiaInput.dataset.bypass = "true";
                      originalClick.apply(currentSveltiaInput);
                  }
              });

              document.getElementById('btn-cancel').addEventListener('click', () => {
                  dialog.close();
                  currentSveltiaInput = null;
              });
          }
          return dialog;
      }

      // 1. Intercepte les appels programmatiques de Sveltia
      HTMLInputElement.prototype.click = function() {
          if (this.type === 'file') {
              if (this.dataset.bypass === "true") {
                  this.dataset.bypass = "false";
                  return originalClick.apply(this, arguments);
              }

              const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 0;
              if (isMobile) {
                  currentSveltiaInput = this;
                  const modalEl = ensureModal();
                  if (!modalEl.open) modalEl.showModal(); // Utilise l'API native Top Layer
                  return;
              }
          }
          return originalClick.apply(this, arguments);
      };

      // 2. Intercepte les clics directs (si Sveltia rend l'input transparent)
      document.addEventListener('click', function(e) {
          if (e.target && e.target.tagName === 'INPUT' && e.target.type === 'file') {
              if (e.target.dataset.bypass === "true") {
                  e.target.dataset.bypass = "false";
                  return;
              }
              const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || navigator.maxTouchPoints > 0;
              if (isMobile) {
                  e.preventDefault(); 
                  currentSveltiaInput = e.target;
                  const modalEl = ensureModal();
                  if (!modalEl.open) modalEl.showModal(); // Utilise l'API native Top Layer
              }
          }
      }, true);
    })();
  </script>
  <!-- Sveltia CMS : Alternative moderne à Decap CMS qui fonctionne à 100% sur GitHub sans serveur -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
