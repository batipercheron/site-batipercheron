<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - Bati Percheron</title>
</head>
<body>
  <script>
    // Surcharge de la méthode click() pour intercepter l'ouverture du sélecteur de fichiers de Sveltia CMS
    const originalClick = HTMLInputElement.prototype.click;
    HTMLInputElement.prototype.click = function() {
        if (this.type === 'file') {
            // Détection des mobiles
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            
            if (isAndroid || isIOS) {
                // On met une petite pause visuelle pour l'UI avec un confirm natif
                const useCamera = window.confirm(
                    "📷 SOURCE DE L'IMAGE\n\n" +
                    "Voulez-vous prendre une photo directement avec l'appareil photo ?\n\n" +
                    "👉 [ OK ] pour prendre une Photo\n" +
                    "👉 [ Annuler ] pour choisir un Fichier local"
                );

                if (useCamera) {
                    // Force l'ouverture directe de l'appareil photo arrière
                    this.setAttribute('capture', 'environment');
                    this.setAttribute('accept', 'image/*');
                } else {
                    // Supprime le mode appareil photo
                    this.removeAttribute('capture');
                    // ASTUCE CRUCIALE POUR ANDROID :
                    // Sur Android 13+, accept="image/*" ouvre le nouveau Photo Picker (qui force souvent Google Photos).
                    // En mettant accept="*/*", on contourne ce Photo Picker et on ouvre l'explorateur de fichiers local natif !
                    if (isAndroid) {
                        this.setAttribute('accept', '*/*');
                    } else {
                        this.setAttribute('accept', 'image/*');
                    }
                }
            }
        }
        return originalClick.apply(this, arguments);
    };
  </script>
  <!-- Sveltia CMS : Alternative moderne à Decap CMS qui fonctionne à 100% sur GitHub sans serveur -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
