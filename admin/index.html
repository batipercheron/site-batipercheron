<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - Bati Percheron</title>
</head>
<body>
  <script>
    // SOLUTION DIRECTE ET 100% FIABLE.
    // Problème : Android ouvre Google Photos à cause de l'attribut accept="image/*".
    // Solution : On force discrètement accept="*/*" sur tous les champs d'envoi de fichier Sveltia.
    // Cela force Android à ouvrir le vrai gestionnaire de fichiers natif,
    // qui propose naturellement l'Appareil Photo et la Galerie Locale (et non Google Photos).

    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            if (mutation.addedNodes) {
                mutation.addedNodes.forEach((node) => {
                    if (node.nodeType === 1) { // ELEMENT_NODE
                        if (node.tagName === 'INPUT' && node.type === 'file') {
                            node.setAttribute('accept', '*/*');
                            node.setAttribute('multiple', 'multiple');
                            node.removeAttribute('capture');
                        } else if (node.querySelectorAll) {
                            node.querySelectorAll('input[type="file"]').forEach(input => {
                                input.setAttribute('accept', '*/*');
                                input.setAttribute('multiple', 'multiple');
                                input.removeAttribute('capture');
                            });
                        }
                    }
                });
            }
        });
    });

    // On observe tout le document dès le début
    observer.observe(document.documentElement, { childList: true, subtree: true });

    // Sécurité supplémentaire : au moment exact du clic (sur le bouton, le label, ou l'input caché)
    document.addEventListener('click', function(e) {
        let target = e.target;
        while (target && target !== document) {
            if (target.tagName === 'INPUT' && target.type === 'file') {
                target.setAttribute('accept', '*/*');
                target.setAttribute('multiple', 'multiple');
                target.removeAttribute('capture');
                break;
            }
            if (target.tagName === 'LABEL' && target.htmlFor) {
                let input = document.getElementById(target.htmlFor);
                if (input && input.type === 'file') {
                    input.setAttribute('accept', '*/*');
                    input.setAttribute('multiple', 'multiple');
                    input.removeAttribute('capture');
                }
            }
            target = target.parentNode;
        }
    }, true);
  </script>
  <!-- Sveltia CMS : Alternative moderne à Decap CMS qui fonctionne à 100% sur GitHub sans serveur -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
