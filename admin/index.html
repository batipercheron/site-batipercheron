<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - Bati Percheron</title>
</head>
<body>
  <script>
    // Logique pour forcer l'appareil photo ou l'explorateur local
    function applyCameraLogic(inputElement) {
        // Détection mobile
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (!isAndroid && !isIOS) return;

        // Évite de demander en boucle si l'événement se répète
        if (inputElement.dataset.asked === "true") return;

        const useCamera = window.confirm(
            "📷 SOURCE DE L'IMAGE\n\n" +
            "Voulez-vous prendre une photo directement avec l'appareil photo ?\n\n" +
            "👉 [ OK ] pour prendre une Photo\n" +
            "👉 [ Annuler ] pour un Fichier local"
        );

        if (useCamera) {
            inputElement.setAttribute('capture', 'environment');
            inputElement.setAttribute('accept', 'image/*');
        } else {
            inputElement.removeAttribute('capture');
            if (isAndroid) {
                // Force l'explorateur de fichiers au lieu du Photo Picker Google
                inputElement.setAttribute('accept', '*/*');
            } else {
                inputElement.setAttribute('accept', 'image/*');
            }
        }
        // Marque l'input pour ne pas redemander au même clic
        inputElement.dataset.asked = "true";
        setTimeout(() => { inputElement.dataset.asked = "false"; }, 1000);
    }

    // 1. Intercepte si Sveltia appelle input.click() en Javascript (cas le plus probable)
    const originalClick = HTMLInputElement.prototype.click;
    HTMLInputElement.prototype.click = function() {
        if (this.type === 'file') {
            applyCameraLogic(this);
        }
        return originalClick.apply(this, arguments);
    };

    // 2. Intercepte si l'utilisateur clique physiquement sur un input file caché
    document.addEventListener('click', function(e) {
        if (e.target && e.target.tagName === 'INPUT' && e.target.type === 'file') {
            applyCameraLogic(e.target);
        }
    }, true); // true = phase de capture (avant que le navigateur ouvre la galerie)
  </script>
  <!-- Sveltia CMS : Alternative moderne à Decap CMS qui fonctionne à 100% sur GitHub sans serveur -->
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
